# artemis (192.168.3.196) - Debian 12 - OpenMediaVault NAS
# NFS (2049), Samba (139/445), HTTP (80), NFS portmap (111)
# NOTE: NFS and Samba must remain open for lab file sharing
ufw_set_default_policy: true
ufw_allowed_tcp_ports:
  - 22
  - 80     # OMV web UI
  - 111    # NFS portmapper
  - 139    # Samba NetBIOS
  - 445    # Samba SMB
  - 2049   # NFS
