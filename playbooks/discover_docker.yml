---
# ============================================================
# playbooks/discover_docker.yml
# Scans all managed_linux hosts for a live Docker daemon and
# writes confirmed nodes to inventory/docker_hosts_discovered.ini.
#
# Review that file, then promote confirmed hosts into the
# [docker_hosts] section of inventory/hosts.ini.
#
# Usage:
#   ansible-playbook playbooks/discover_docker.yml
# ============================================================

- name: Probe each host for Docker
  hosts: managed_linux
  gather_facts: no
  any_errors_fatal: false

  tasks:
    - name: Check Docker socket
      stat:
        path: /var/run/docker.sock
      register: docker_sock
      become: yes
      ignore_errors: yes

    - name: Check Docker daemon responds
      command: docker info
      register: docker_info
      changed_when: false
      failed_when: false
      become: yes
      when: docker_sock.stat is defined and docker_sock.stat.exists

    - name: Set docker_capable fact
      set_fact:
        docker_capable: >-
          {{ (docker_sock.stat is defined and docker_sock.stat.exists)
             and (docker_info.rc is defined and docker_info.rc == 0) }}

- name: Write discovered docker_hosts inventory file
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Collect Docker-capable hosts
      set_fact:
        discovered: >-
          {{
            groups['managed_linux']
            | select('in', hostvars)
            | selectattr('0', 'defined')
            | map('extract', hostvars)
            | selectattr('docker_capable', 'defined')
            | selectattr('docker_capable', 'equalto', true)
            | map(attribute='inventory_hostname')
            | list
          }}
      vars:
        # selectattr workaround for older Jinja2
        _hosts: "{{ groups['managed_linux'] }}"
      run_once: true

    - name: Show discovered Docker hosts
      debug:
        msg: "Docker confirmed on: {{ groups['managed_linux'] | select('in', hostvars) | map('extract', hostvars) | selectattr('docker_capable', 'defined') | selectattr('docker_capable', 'equalto', true) | map(attribute='inventory_hostname') | list }}"

    - name: Write docker_hosts_discovered.ini
      copy:
        dest: "{{ playbook_dir }}/../inventory/docker_hosts_discovered.ini"
        content: |
          # Auto-generated by discover_docker.yml — {{ lookup('pipe', 'date +%Y-%m-%d') }}
          # Review this file, then add confirmed hosts to [docker_hosts] in hosts.ini.
          [docker_hosts_discovered]
          {% for h in groups['managed_linux'] %}
          {% if hostvars[h].docker_capable is defined and hostvars[h].docker_capable %}
          {{ h }} ansible_host={{ hostvars[h]['ansible_host'] }}
          {% endif %}
          {% endfor %}

          [docker_hosts_discovered:vars]
          ansible_user=saquadri
          portainer_agent_port=9001
      run_once: true
