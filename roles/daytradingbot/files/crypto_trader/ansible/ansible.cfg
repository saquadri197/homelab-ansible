[defaults]
inventory          = inventory.yml
roles_path         = roles
collections_path   = ~/.ansible/collections
host_key_checking  = False        # Avoids prompt on first SSH to new VM
retry_files_enabled = False
stdout_callback    = yaml          # Cleaner output format
interpreter_python = auto_silent

[privilege_escalation]
become       = True
become_method = sudo
become_user  = root
# If your Debian user needs a sudo password:
# become_ask_pass = True
# Or pass on CLI: ansible-playbook playbook.yml --ask-become-pass

[ssh_connection]
pipelining   = True               # Speeds up task execution significantly
ssh_args     = -o ControlMaster=auto -o ControlPersist=60s
