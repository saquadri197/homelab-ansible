# ansible/roles/crypto-trader/handlers/main.yml
# Handlers run once at the end of a play, only if notified.

---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart crypto-trader
  ansible.builtin.systemd:
    name:  crypto-trader
    state: restarted

- name: restart cloudflared
  ansible.builtin.systemd:
    name:  cloudflared
    state: restarted
