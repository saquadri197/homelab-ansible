# cloudflared/tunnel-config.yml
# ──────────────────────────────────────────────────────────────────────────────
# Cloudflare Tunnel configuration snippet for the Crypto Trader webhook server.
#
# Since you already have a tunnel running, you just need to add a new
# ingress rule to your existing tunnel config.
#
# YOUR EXISTING CONFIG is typically at one of these paths:
#   /etc/cloudflared/config.yml          (if running as a system service)
#   ~/.cloudflared/config.yml            (if running as your user)
#
# WHAT TO ADD:
# Find the `ingress:` section in your existing config and add the
# crypto-trader rule BEFORE the final catch-all rule (which must be last).
#
# Example — your existing config probably looks something like:
#
#   tunnel: your-tunnel-id
#   credentials-file: /etc/cloudflared/your-tunnel-id.json
#
#   ingress:
#     - hostname: homeassistant.yourdomain.com    ← your existing services
#       service: http://192.168.1.10:8123
#
#     - service: http_status:404                  ← catch-all (must be last)
#
# ADD the crypto-trader block before the catch-all:
# ──────────────────────────────────────────────────────────────────────────────

ingress:
  # ── ADD THIS BLOCK to your existing ingress list ───────────────────────────

  - hostname: bandit.syedaq.com
    service: http://localhost:5000
    originRequest:
      connectTimeout: 30s
      # No TLS between cloudflared and uvicorn — traffic stays on localhost
      # Cloudflare handles TLS at the edge (your tunnel already does this)
      noTLSVerify: true

  # ── Keep your existing catch-all as the LAST rule ─────────────────────────
  # - service: http_status:404

# ──────────────────────────────────────────────────────────────────────────────
# DNS SETUP (one-time, in Cloudflare dashboard):
#
#   1. Go to Cloudflare Dashboard → your domain → DNS
#   2. Add a CNAME record:
#      Name:    crypto-trader
#      Target:  your-tunnel-id.cfargotunnel.com
#      Proxy:   Enabled (orange cloud)
#
#   OR use the CLI (replaces steps 1-2):
#      cloudflared tunnel route dns <tunnel-name> crypto-trader.yourdomain.com
#
# After DNS is set, TradingView can reach your server at:
#   https://crypto-trader.yourdomain.com/webhook
#   https://crypto-trader.yourdomain.com/health    (test this first)
# ──────────────────────────────────────────────────────────────────────────────
# AFTER EDITING YOUR CONFIG:
#
#   sudo systemctl restart cloudflared
#
# VERIFY the tunnel is routing correctly:
#   curl https://crypto-trader.yourdomain.com/health
#   # Should return: {"status":"ok","time":"...","open_positions":[]}
# ──────────────────────────────────────────────────────────────────────────────
