# /etc/nginx/sites-available/crypto-trader
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║  NOTE: This file is NOT needed if you are using Cloudflare       ║
# ║  Tunnel (cloudflared). Cloudflare handles SSL termination at     ║
# ║  the edge and routes traffic directly to localhost:8000.         ║
# ║  The uvicorn server is configured to listen on 127.0.0.1 only.  ║
# ║                                                                  ║
# ║  Only use this nginx config if you are NOT using cloudflared     ║
# ║  and need a local reverse proxy with SSL.                        ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# INSTALL (only if NOT using cloudflared):
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo cp setup/nginx.conf /etc/nginx/sites-available/crypto-trader
#   sudo ln -s /etc/nginx/sites-available/crypto-trader \
#              /etc/nginx/sites-enabled/crypto-trader
#
# PORT FORWARD (on your router, only if NOT using cloudflared):
#   External port 443 → ESXi VM IP : 443
#   External port 80  → ESXi VM IP : 80

# ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;   # Replace _ with your domain if you have one

    # Let's Encrypt challenge (needed for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — main server ───────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;   # Replace _ with your domain if you have one

    # ── SSL certificates ──────────────────────────────────────────────────────
    # With a domain + certbot: certbot fills these in automatically.
    # With a self-signed cert:
    #   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #     -keyout /etc/ssl/private/crypto-trader.key \
    #     -out    /etc/ssl/certs/crypto-trader.crt
    ssl_certificate     /etc/ssl/certs/crypto-trader.crt;
    ssl_certificate_key /etc/ssl/private/crypto-trader.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Rate limiting (prevents webhook flooding) ─────────────────────────────
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=10r/m;

    # ── Webhook endpoints ─────────────────────────────────────────────────────
    location /webhook {
        limit_req zone=webhook burst=5 nodelay;

        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout  30s;
        proxy_send_timeout  30s;
        proxy_connect_timeout 10s;
    }

    # ── Health check (no rate limit) ──────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # ── Block everything else ─────────────────────────────────────────────────
    location / {
        return 404;
    }

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/crypto-trader-access.log;
    error_log  /var/log/nginx/crypto-trader-error.log;
}
